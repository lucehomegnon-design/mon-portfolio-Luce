<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luce HOMEGNON | Écrivaine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== DESIGN (identique à la version précédente) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1f2e;
            color: #fff;
            line-height: 1.6;
            scroll-behavior: smooth;
        }
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(145deg, #a0d2ff 0%, #0a192f 80%, #030c18 100%);
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.2);}
        }
        .deco-sun {
            position: fixed;
            top: 10%;
            right: 5%;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffdd88, #ffaa33);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255,200,100,0.5);
            z-index: -1;
            opacity: 0.7;
        }
        .deco-moon {
            position: fixed;
            top: 15%;
            left: 5%;
            width: 60px;
            height: 60px;
            background: #f0f0e0;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,255,200,0.6);
            z-index: -1;
        }
        .deco-moon::after {
            content: '';
            position: absolute;
            background: #0a192f;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            top: 20px;
            left: 15px;
            box-shadow: 8px 8px 0 #0a192f, -4px 4px 0 #0a192f;
        }
        .tree {
            position: fixed;
            bottom: 0;
            width: 40px;
            height: 80px;
            background: #2d4a2c;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            z-index: -1;
        }
        .tree1 { left: 5%; width: 50px; height: 100px; }
        .tree2 { left: 15%; width: 35px; height: 70px; background: #3b5e3a; }
        .tree3 { right: 12%; width: 60px; height: 120px; }
        .tree4 { right: 25%; width: 40px; height: 85px; background: #2e5c2c; }
        .child {
            position: fixed;
            bottom: 0;
            width: 30px;
            height: 50px;
            background: #4a2a1a;
            border-radius: 20px 20px 0 0;
            z-index: -1;
        }
        .child1 { left: 25%; bottom: 0; width: 20px; height: 45px; background: #5d3a1e; }
        .child2 { left: 28%; bottom: 0; width: 22px; height: 48px; background: #6b4c2c; }
        .child3 { right: 35%; bottom: 0; width: 18px; height: 42px; background: #4f321a; }
        .child1::after, .child2::after, .child3::after {
            content: '';
            position: absolute;
            top: -15px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #d9b382;
            border-radius: 50%;
        }
        .child2::after { left: 3px; width: 18px; height: 18px; }
        .child3::after { left: 1px; width: 14px; height: 14px; }
        header {
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(100,255,218,0.3);
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            flex-wrap: wrap;
        }
        .logo {
            background: linear-gradient(135deg, #e0f0ff, #64ffda);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            cursor: pointer;
        }
        .nav-links a:hover {
            color: #64ffda;
        }
        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
        }
        section {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            margin-bottom: 2rem;
        }
        .section-title {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 8px rgba(100,255,218,0.5);
        }
        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #a0d2ff, #64ffda);
            margin: 0.8rem auto 0;
            border-radius: 2px;
        }
        .hero {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: transparent;
            backdrop-filter: blur(4px);
            border-radius: 48px;
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 1rem; }
        .hero .highlight { color: #64ffda; }
        .hero p { font-size: 1.2rem; max-width: 700px; margin-bottom: 2rem; }
        .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .btn {
            display: inline-block;
            background: transparent;
            border: 2px solid #64ffda;
            color: #64ffda;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
            cursor: pointer;
        }
        .btn-primary { background: #64ffda; color: #0a192f; }
        .btn-primary:hover { background: transparent; color: #64ffda; transform: scale(1.05); }
        .btn-outline:hover { background: #64ffda; color: #0a192f; }
        .about-content { display: flex; gap: 3rem; align-items: center; flex-wrap: wrap; }
        .about-text { flex: 2; }
        .about-photo { flex: 1; text-align: center; }
        .photo-placeholder {
            background: linear-gradient(135deg, #a0d2ff, #64ffda);
            width: 100%;
            max-width: 280px;
            height: 280px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a192f;
            font-size: 5rem;
            margin: 0 auto;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.3);
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        .project-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid rgba(100,255,218,0.4);
            cursor: pointer;
        }
        .project-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.2); }
        .project-img {
            width: 100%;
            height: 180px;
            background: rgba(10,25,47,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .project-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .project-img i {
            font-size: 3rem;
            color: #64ffda;
        }
        .project-info { padding: 1.5rem; }
        .project-info h3 { margin-bottom: 0.5rem; color: #fff; }
        .project-info p { font-size: 0.9rem; color: #e0e0e0; margin-top: 0.5rem; }
        .prix-info { font-size: 0.8rem; color: #64ffda; margin-top: 0.8rem; font-weight: bold; }
        .btn-lire {
            display: inline-block;
            margin-top: 1rem;
            background: #64ffda;
            color: #0a192f;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-lire:hover { background: transparent; color: #64ffda; border: 1px solid #64ffda; }
        .skills-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; }
        .skill-item {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            padding: 1.5rem;
            border-radius: 40px;
            text-align: center;
            width: 140px;
            transition: all 0.3s;
            border: 1px solid rgba(100,255,218,0.4);
        }
        .skill-item i { font-size: 3rem; color: #64ffda; margin-bottom: 0.5rem; }
        .skill-item span { display: block; font-weight: 500; color: white; }
        .skill-item:hover { transform: scale(1.05); background: rgba(100,255,218,0.2); }
        .contact-wrapper { display: flex; flex-wrap: wrap; gap: 3rem; }
        .contact-info, .contact-form { flex: 1; }
        .contact-details { list-style: none; margin: 1.5rem 0; }
        .contact-details li { margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; color: white; }
        .contact-details i { width: 30px; color: #64ffda; }
        .social-links { display: flex; gap: 1.5rem; margin-top: 2rem; }
        .social-links a { color: white; font-size: 2rem; transition: color 0.3s; }
        .social-links a:hover { color: #64ffda; }
        .form-group { margin-bottom: 1.2rem; }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(100,255,218,0.5);
            border-radius: 16px;
            font-family: inherit;
            color: white;
        }
        input:focus, textarea:focus { outline: none; border-color: #64ffda; box-shadow: 0 0 0 3px rgba(100,255,218,0.2); }
        button {
            background: #64ffda;
            color: #0a192f;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: transparent; color: #64ffda; border: 2px solid #64ffda; }
        footer { text-align: center; padding: 2rem; background: rgba(10,25,47,0.8); color: #a0d2ff; font-size: 0.9rem; }
        .message-payant {
            background: rgba(100,255,218,0.2);
            border-left: 4px solid #64ffda;
            padding: 1rem;
            border-radius: 12px;
            margin: 1rem 0;
            font-style: italic;
        }
        .admin-panel { background: rgba(10,25,47,0.95); padding: 2rem; border-radius: 32px; margin-top: 2rem; }
        .admin-panel h3 { color: #64ffda; margin-bottom: 1rem; }
        .admin-form { margin-bottom: 2rem; }
        .chapitre-item {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .chapitre-titre {
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #64ffda;
        }
        .chapitre-contenu {
            white-space: pre-wrap;
        }
        .story-list, .comments-list { margin-top: 2rem; }
        .story-item, .comment-item {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .story-actions button, .comment-actions button { margin-left: 0.5rem; background: #64ffda; color: #0a192f; padding: 0.3rem 0.8rem; font-size: 0.8rem; }
        .comments-section {
            margin-top: 2rem;
            border-top: 1px solid rgba(100,255,218,0.3);
            padding-top: 1rem;
        }
        .comments-section h4 { color: #64ffda; margin-bottom: 1rem; }
        .comment {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
        }
        .comment-author { font-weight: bold; color: #64ffda; }
        .comment-text { margin-top: 0.2rem; }
        .comment-reply {
            margin-left: 1rem;
            margin-top: 0.5rem;
            padding-left: 0.5rem;
            border-left: 2px solid #64ffda;
            font-style: italic;
            color: #ccc;
        }
        .add-comment textarea { width: 100%; margin-top: 0.5rem; }
        .notification-banner {
            background: #64ffda;
            color: #0a192f;
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
        }
        .login-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(100,255,218,0.8);
            color: #0a192f;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .login-icon:hover { background: #64ffda; transform: scale(1.1); }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links { display: none; width: 100%; flex-direction: column; align-items: center; gap: 1rem; padding: 1rem 0; }
            .nav-links.active { display: flex; }
            .hero h1 { font-size: 2.2rem; }
            .section-title { font-size: 2rem; }
            section { margin: 1rem; padding: 2rem 1rem; }
            .deco-sun, .deco-moon { width: 40px; height: 40px; }
            .tree { transform: scale(0.7); }
            .child { transform: scale(0.7); }
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="stars" id="stars"></div>
    <div class="deco-sun"></div>
    <div class="deco-moon"></div>
    <div class="tree tree1"></div>
    <div class="tree tree2"></div>
    <div class="tree tree3"></div>
    <div class="tree tree4"></div>
    <div class="child child1"></div>
    <div class="child child2"></div>
    <div class="child child3"></div>

    <div id="notification-area"></div>
    <div id="login-icon" class="login-icon" style="display: none;" title="Connexion admin"><i class="fas fa-lock"></i></div>

    <header>
        <nav>
            <div class="logo" onclick="showHome()">✧ Luce écrit ✧</div>
            <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
            <ul class="nav-links" id="nav-links">
                <li><a onclick="showHome()">Accueil</a></li>
                <li><a onclick="showAbout()">À propos</a></li>
                <li><a onclick="showStories()">Histoires</a></li>
                <li><a onclick="showUnivers()">Univers</a></li>
                <li><a onclick="showContact()">Contact</a></li>
                <li id="admin-link" style="display: none;"><a onclick="showAdminPanel()">Admin</a></li>
            </ul>
        </nav>
    </header>

    <main id="app"></main>
    <footer><p>© 2025 Luce HOMEGNON - Tous droits réservés.</p></footer>

    <script>
        // ========== STOCKAGE ==========
        let stories = [];
        let lastUpdate = localStorage.getItem('luce_lastUpdate') || 0;
        let visitorLastVisit = localStorage.getItem('luce_visitorLastVisit') || 0;
        let adminLoggedIn = false;

        // Informations de l'admin (modifiables)
        let adminNom = localStorage.getItem('adminNom') || "HOMEGNON";
        let adminPrenom = localStorage.getItem('adminPrenom') || "Luce";
        let adminEmail = localStorage.getItem('adminEmail') || "lucehomegnon@gmail.com";
        let adminPassword = localStorage.getItem('adminPassword') || "luce123";
        let whatsappPro = localStorage.getItem('whatsappPro') || "2290155204040";

        function loadStories() {
            const stored = localStorage.getItem('luce_stories');
            if(stored) {
                stories = JSON.parse(stored);
            } else {
                stories = [];
                saveStories();
            }
        }
        function saveStories() {
            localStorage.setItem('luce_stories', JSON.stringify(stories));
            lastUpdate = Date.now();
            localStorage.setItem('luce_lastUpdate', lastUpdate);
        }

        // ========== VISIBILITÉ DU CADENAS (seulement si ?admin=true dans l'URL ou si déjà connecté) ==========
        function checkAdminVisibility() {
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('admin') && urlParams.get('admin') === 'true') {
                document.getElementById('login-icon').style.display = 'flex';
            } else if(adminLoggedIn) {
                document.getElementById('login-icon').style.display = 'flex';
            } else {
                document.getElementById('login-icon').style.display = 'none';
            }
        }

        // ========== NOTIFICATION ==========
        function checkForUpdates() {
            const storedLastUpdate = localStorage.getItem('luce_lastUpdate');
            if(storedLastUpdate && visitorLastVisit < storedLastUpdate) {
                const notificationDiv = document.getElementById('notification-area');
                notificationDiv.innerHTML = `<div class="notification-banner" onclick="this.remove()">
                    ✨ Nouvelles histoires ou nouveaux chapitres ont été ajoutés ! ✨
                </div>`;
            }
            localStorage.setItem('luce_visitorLastVisit', Date.now());
            visitorLastVisit = Date.now();
        }

        // ========== LOGIQUE DE MONÉTISATION ==========
        function getPaymentRule(story) {
            const sorted = [...stories].sort((a,b) => a.dateAjout - b.dateAjout);
            const idx = sorted.findIndex(s => s.id === story.id);
            if(idx < 3) return { type: 'free', message: 'Les 3 premières histoires sont gratuites' };
            const seuilGratuit = story.seuilGratuit || 3;
            const limitePayant = story.limitePayant || 12;
            const prix = story.prix || 500;
            if(story.chapitres.length > limitePayant) {
                return { type: 'paid', freeChapters: seuilGratuit, pricePerChapter: prix };
            } else {
                return { type: 'free', message: 'Histoire gratuite' };
            }
        }

        // ========== COMMENTAIRES ==========
        function loadComments(storyId) {
            const key = `comments_${storyId}`;
            const stored = localStorage.getItem(key);
            return stored ? JSON.parse(stored) : [];
        }
        function saveComments(storyId, comments) {
            const key = `comments_${storyId}`;
            localStorage.setItem(key, JSON.stringify(comments));
        }
        function addComment(storyId, author, text) {
            const comments = loadComments(storyId);
            comments.push({ id: Date.now(), author, text, date: new Date().toLocaleString(), replies: [] });
            saveComments(storyId, comments);
            return comments;
        }
        function addReply(storyId, commentId, replyText) {
            const comments = loadComments(storyId);
            const comment = comments.find(c => c.id === commentId);
            if(comment) {
                if(!comment.replies) comment.replies = [];
                comment.replies.push({ author: `${adminPrenom} ${adminNom}`, text: replyText, date: new Date().toLocaleString() });
                saveComments(storyId, comments);
            }
            return comments;
        }

        // ========== LECTURE ==========
        let currentStory = null, currentChapter = 1, paymentGranted = false;
        function readStory(id) {
            currentStory = stories.find(s => s.id === id);
            if(!currentStory) return;
            currentChapter = 1;
            paymentGranted = false;
            const chapters = currentStory.chapitres;
            const totalChapters = chapters.length;
            const rule = getPaymentRule(currentStory);
            function render() {
                const chapter = chapters[currentChapter-1];
                let chapterContent = chapter ? chapter.contenu : '';
                let showPayment = false, paymentHtml = '', specialMsg = '';
                if(rule.type === 'paid') {
                    if(currentChapter > rule.freeChapters && !paymentGranted) {
                        showPayment = true;
                        paymentHtml = `<div class="message-payant">
                            <i class="fas fa-lock"></i> Ce chapitre est payant (${rule.pricePerChapter} FCFA). 
                            <br>Veuillez envoyer l'argent via <strong>Moov Money</strong> au numéro <strong>${whatsappPro}</strong> (WhatsApp professionnel).
                            <br>Après paiement, cliquez sur le bouton ci-dessous pour confirmer.
                            <br><button class="btn" onclick="requestPayment()">J'ai payé, débloquer le chapitre</button>
                        </div>`;
                    } else if(currentChapter > rule.freeChapters && paymentGranted) {
                        paymentHtml = `<div class="message-payant">Merci beaucoup. Que Dieu vous bénisse !</div>`;
                    }
                }
                if(currentChapter > 1 && !showPayment) {
                    specialMsg = `<div class="message-payant"><i class="fas fa-heart"></i> Vous êtes une personne spéciale. La vie a besoin de quelqu’un comme vous. Que Dieu vous bénisse !</div>`;
                }

                const comments = loadComments(currentStory.id);
                let commentsHtml = '<div class="comments-section"><h4>Commentaires</h4>';
                if(comments.length === 0) commentsHtml += '<p>Aucun commentaire pour le moment. Soyez le premier à réagir !</p>';
                else {
                    comments.forEach(c => {
                        commentsHtml += `<div class="comment">
                            <span class="comment-author">${escapeHtml(c.author)}</span> <span style="font-size:0.8rem;">(${c.date})</span>
                            <div class="comment-text">${escapeHtml(c.text)}</div>`;
                        if(c.replies && c.replies.length) {
                            c.replies.forEach(r => {
                                commentsHtml += `<div class="comment-reply"><strong>${escapeHtml(r.author)}</strong> (${r.date}) : ${escapeHtml(r.text)}</div>`;
                            });
                        }
                        commentsHtml += `</div>`;
                    });
                }
                commentsHtml += `<div class="add-comment"><textarea id="newCommentText" placeholder="Votre commentaire..." rows="2"></textarea>
                                 <button onclick="postComment(${currentStory.id})">Envoyer un commentaire</button></div></div>`;
                const html = `
                    <section style="max-width:800px; margin:0 auto;">
                        <div style="background:rgba(10,25,47,0.8); border-radius:32px; padding:2rem;">
                            <h1 style="color:#64ffda;">${escapeHtml(currentStory.titre)}</h1>
                            <div style="margin:2rem 0;">
                                <h3 style="color:#64ffda;">${escapeHtml(chapter.titre)}</h3>
                                <div style="margin-top:1rem;">${chapterContent.replace(/\n/g, '<br>')}</div>
                            </div>
                            ${specialMsg}
                            ${paymentHtml}
                            <div style="display:flex; justify-content:space-between; margin-top:2rem;">
                                ${currentChapter>1 ? `<button class="btn" onclick="changeChapter(${currentChapter-1})">◀ Chapitre précédent</button>` : '<span></span>'}

        // ========== UTILITAIRES ==========
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }

        // ========== INIT ==========
        loadStories();
        checkForUpdates();
        showHome();
        checkAdminVisibility();

        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        mobileMenu.addEventListener('click', () => navLinks.classList.toggle('active'));
        const loginIcon = document.getElementById('login-icon');
        loginIcon.addEventListener('click', () => showAdminLogin());

        function createStars() {
            const container = document.getElementById('stars');
            for(let i=0;i<200;i++) {
                let s = document.createElement('div');
                s.classList.add('star');
                let sz = Math.random()*3+1;
                s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${Math.random()*2+1}s`;
                container.appendChild(s);
            }
        }
        createStars();
    </script>
</body>
</html>
